<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Decoder - Decode & Inspect JSON Web Tokens</title>
    <meta name="description" content="Free online JWT decoder. Decode and inspect JSON Web Tokens locally in your browser. No data sent to servers.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --border: #30363d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
            --accent-purple: #a371f7;
            --header-color: #ff6b6b;
            --payload-color: #4ecdc4;
            --signature-color: #95a5a6;
        }

        [data-theme="light"] {
            --bg-primary: #f6f8fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --accent-blue: #2563eb;
            --accent-green: #16a34a;
            --accent-red: #dc2626;
            --accent-yellow: #ca8a04;
            --accent-purple: #7c3aed;
            --header-color: #dc2626;
            --payload-color: #0d9488;
            --signature-color: #6b7280;
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 2rem;
            z-index: 1000;
        }
        
        .theme-toggle button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        
        .theme-toggle button:hover {
            background: var(--bg-tertiary);
        }
        
        .theme-toggle button.active {
            background: var(--accent-blue);
            color: white;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--header-color), var(--payload-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .privacy-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--accent-green);
            border-radius: 2rem;
            font-size: 0.85rem;
            color: var(--accent-green);
        }

        .input-section {
            margin-bottom: 2rem;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .input-label h2 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--text-muted);
        }

        .btn-primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .btn-primary:hover {
            background: #4c96e8;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border-radius: 6px;
            font-size: 0.875rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-valid {
            color: var(--accent-green);
        }

        .status-invalid {
            color: var(--accent-red);
        }

        .status-expired {
            color: var(--accent-yellow);
        }

        .decoded-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .panel-title.header {
            color: var(--header-color);
        }

        .panel-title.payload {
            color: var(--payload-color);
        }

        .panel-title.signature {
            color: var(--signature-color);
        }

        .panel-body {
            padding: 1rem;
        }

        .json-view {
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .json-key {
            color: var(--accent-purple);
        }

        .json-string {
            color: var(--accent-green);
        }

        .json-number {
            color: var(--accent-blue);
        }

        .json-boolean {
            color: var(--accent-yellow);
        }

        .json-null {
            color: var(--text-muted);
        }

        .signature-text {
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .claims-table {
            width: 100%;
            border-collapse: collapse;
        }

        .claims-table th,
        .claims-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .claims-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .claims-table td {
            font-size: 0.9rem;
        }

        .claims-table tr:last-child td {
            border-bottom: none;
        }

        .claim-name {
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            color: var(--accent-purple);
        }

        .claim-value {
            color: var(--text-primary);
            word-break: break-word;
        }

        .claim-desc {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .time-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .time-relative {
            font-size: 0.8rem;
        }

        .time-expired {
            color: var(--accent-red);
        }

        .time-valid {
            color: var(--accent-green);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .copy-btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
        }

        .copy-btn.copied {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .decoded-section {
                grid-template-columns: 1fr;
            }

            .status-bar {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button data-theme="light" title="Light">☀️</button>
        <button data-theme="dark" title="Dark">🌙</button>
        <button data-theme="system" title="System" class="active">💻</button>
    </div>
    <div class="container">
        <header>
            <h1>🔐 JWT Decoder</h1>
            <p class="subtitle">Decode and inspect JSON Web Tokens instantly</p>
            <div class="privacy-badge">
                <span>🔒</span>
                <span>100% client-side — your tokens never leave your browser</span>
            </div>
        </header>

        <section class="input-section">
            <div class="input-label">
                <h2>Paste your JWT token</h2>
                <div class="btn-group">
                    <button class="btn" onclick="loadSample()">Load Sample</button>
                    <button class="btn" onclick="clearAll()">Clear</button>
                </div>
            </div>
            <textarea 
                id="jwt-input" 
                placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                oninput="decodeJWT()"
            ></textarea>
            <div id="status-bar" class="status-bar" style="display: none;">
                <div class="status-item" id="status-structure"></div>
                <div class="status-item" id="status-expiry"></div>
                <div class="status-item" id="status-algo"></div>
            </div>
        </section>

        <div id="decoded-content">
            <div class="empty-state">
                <div class="empty-state-icon">🔑</div>
                <p>Paste a JWT token above to decode it</p>
            </div>
        </div>

        <footer>
            <p>Built with ❤️ by <a href="https://entazis.dev">entazis.dev</a></p>
        </footer>
    </div>

    <script>
        // Track page visit
        fetch('/api/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                metrics: [{
                    name: 'web_page_visits',
                    type: 'counter',
                    value: 1,
                    labels: { site: 'jwt', page: location.pathname }
                }]
            })
        }).catch(() => {});

        const REGISTERED_CLAIMS = {
            iss: 'Issuer',
            sub: 'Subject',
            aud: 'Audience',
            exp: 'Expiration Time',
            nbf: 'Not Before',
            iat: 'Issued At',
            jti: 'JWT ID'
        };

        function base64UrlDecode(str) {
            // Replace URL-safe characters and add padding
            str = str.replace(/-/g, '+').replace(/_/g, '/');
            const pad = str.length % 4;
            if (pad) {
                str += '='.repeat(4 - pad);
            }
            try {
                return decodeURIComponent(atob(str).split('').map(c => 
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                ).join(''));
            } catch (e) {
                return atob(str);
            }
        }

        function formatJSON(obj) {
            const json = JSON.stringify(obj, null, 2);
            return json.replace(
                /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                match => {
                    let cls = 'json-number';
                    if (/^"/.test(match)) {
                        if (/:$/.test(match)) {
                            cls = 'json-key';
                            match = match.slice(0, -1);
                            return `<span class="${cls}">${match}</span>:`;
                        } else {
                            cls = 'json-string';
                        }
                    } else if (/true|false/.test(match)) {
                        cls = 'json-boolean';
                    } else if (/null/.test(match)) {
                        cls = 'json-null';
                    }
                    return `<span class="${cls}">${match}</span>`;
                }
            );
        }

        function formatTimestamp(ts) {
            if (!ts) return null;
            const date = new Date(ts * 1000);
            const now = new Date();
            const diff = date - now;
            const absDiff = Math.abs(diff);
            
            let relative;
            if (absDiff < 60000) {
                relative = 'just now';
            } else if (absDiff < 3600000) {
                const mins = Math.floor(absDiff / 60000);
                relative = diff > 0 ? `in ${mins}m` : `${mins}m ago`;
            } else if (absDiff < 86400000) {
                const hours = Math.floor(absDiff / 3600000);
                relative = diff > 0 ? `in ${hours}h` : `${hours}h ago`;
            } else {
                const days = Math.floor(absDiff / 86400000);
                relative = diff > 0 ? `in ${days}d` : `${days}d ago`;
            }

            return {
                formatted: date.toLocaleString(),
                relative,
                isPast: diff < 0,
                timestamp: ts
            };
        }

        function decodeJWT() {
            const input = document.getElementById('jwt-input').value.trim();
            const statusBar = document.getElementById('status-bar');
            const decodedContent = document.getElementById('decoded-content');

            if (!input) {
                statusBar.style.display = 'none';
                decodedContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔑</div>
                        <p>Paste a JWT token above to decode it</p>
                    </div>
                `;
                return;
            }

            const parts = input.split('.');
            
            if (parts.length !== 3) {
                statusBar.style.display = 'flex';
                document.getElementById('status-structure').innerHTML = 
                    `<span class="status-invalid">❌ Invalid structure (expected 3 parts, got ${parts.length})</span>`;
                document.getElementById('status-expiry').innerHTML = '';
                document.getElementById('status-algo').innerHTML = '';
                decodedContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Invalid JWT format. A valid JWT has 3 parts separated by dots.</p>
                    </div>
                `;
                return;
            }

            try {
                const header = JSON.parse(base64UrlDecode(parts[0]));
                const payload = JSON.parse(base64UrlDecode(parts[1]));
                const signature = parts[2];

                // Update status bar
                statusBar.style.display = 'flex';
                document.getElementById('status-structure').innerHTML = 
                    `<span class="status-valid">✓ Valid structure</span>`;
                
                document.getElementById('status-algo').innerHTML = 
                    `<span>Algorithm: <strong>${header.alg || 'N/A'}</strong></span>`;

                // Check expiration
                if (payload.exp) {
                    const expTime = formatTimestamp(payload.exp);
                    if (expTime.isPast) {
                        document.getElementById('status-expiry').innerHTML = 
                            `<span class="status-expired">⚠️ Expired ${expTime.relative}</span>`;
                    } else {
                        document.getElementById('status-expiry').innerHTML = 
                            `<span class="status-valid">✓ Valid (expires ${expTime.relative})</span>`;
                    }
                } else {
                    document.getElementById('status-expiry').innerHTML = 
                        `<span class="status-item">No expiration set</span>`;
                }

                // Track decode action
                fetch('/api/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        metrics: [{
                            name: 'jwt_decode_action',
                            type: 'counter',
                            value: 1,
                            labels: { 
                                site: 'jwt',
                                algorithm: header.alg || 'unknown',
                                has_expiry: payload.exp ? 'yes' : 'no'
                            }
                        }]
                    })
                }).catch(() => {});

                // Render decoded content
                decodedContent.innerHTML = `
                    <section class="decoded-section">
                        <div class="panel">
                            <div class="panel-header">
                                <span class="panel-title header">Header</span>
                                <button class="btn copy-btn" onclick="copyToClipboard(this, ${JSON.stringify(JSON.stringify(header, null, 2)).replace(/"/g, '&quot;')})">Copy</button>
                            </div>
                            <div class="panel-body">
                                <div class="json-view">${formatJSON(header)}</div>
                            </div>
                        </div>
                        
                        <div class="panel">
                            <div class="panel-header">
                                <span class="panel-title payload">Payload</span>
                                <button class="btn copy-btn" onclick="copyToClipboard(this, ${JSON.stringify(JSON.stringify(payload, null, 2)).replace(/"/g, '&quot;')})">Copy</button>
                            </div>
                            <div class="panel-body">
                                <div class="json-view">${formatJSON(payload)}</div>
                            </div>
                        </div>
                    </section>

                    <div class="panel" style="margin-bottom: 1.5rem;">
                        <div class="panel-header">
                            <span class="panel-title signature">Signature</span>
                            <button class="btn copy-btn" onclick="copyToClipboard(this, '${signature}')">Copy</button>
                        </div>
                        <div class="panel-body">
                            <p class="signature-text">${signature}</p>
                        </div>
                    </div>

                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">Claims Analysis</span>
                        </div>
                        <div class="panel-body" style="padding: 0;">
                            <table class="claims-table">
                                <thead>
                                    <tr>
                                        <th>Claim</th>
                                        <th>Value</th>
                                        <th>Description</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${Object.entries(payload).map(([key, value]) => {
                                        const isTimeClaim = ['exp', 'nbf', 'iat'].includes(key);
                                        let displayValue = value;
                                        let timeInfo = '';
                                        
                                        if (isTimeClaim && typeof value === 'number') {
                                            const time = formatTimestamp(value);
                                            const isExpired = key === 'exp' && time.isPast;
                                            timeInfo = `<div class="time-info">
                                                <span>${time.formatted}</span>
                                                <span class="time-relative ${isExpired ? 'time-expired' : 'time-valid'}">${time.relative}</span>
                                            </div>`;
                                            displayValue = timeInfo;
                                        } else if (typeof value === 'object') {
                                            displayValue = `<code>${JSON.stringify(value)}</code>`;
                                        }
                                        
                                        return `
                                            <tr>
                                                <td><span class="claim-name">${key}</span></td>
                                                <td class="claim-value">${isTimeClaim ? timeInfo : displayValue}</td>
                                                <td class="claim-desc">${REGISTERED_CLAIMS[key] || 'Custom claim'}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            } catch (e) {
                statusBar.style.display = 'flex';
                document.getElementById('status-structure').innerHTML = 
                    `<span class="status-invalid">❌ Failed to decode: ${e.message}</span>`;
                document.getElementById('status-expiry').innerHTML = '';
                document.getElementById('status-algo').innerHTML = '';
                decodedContent.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Could not decode the token. Make sure it's a valid JWT.</p>
                    </div>
                `;
            }
        }

        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function loadSample() {
            // Sample JWT with realistic claims
            const samplePayload = {
                sub: "user_12345",
                name: "Bence Szabó",
                email: "szabo.bence@example.com",
                role: "admin",
                iat: Math.floor(Date.now() / 1000) - 3600,
                exp: Math.floor(Date.now() / 1000) + 3600,
                iss: "https://auth.example.com",
                aud: "https://api.example.com"
            };
            
            // This is a sample token (not secure, for demo only)
            const token = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.' + 
                btoa(JSON.stringify(samplePayload)).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_') +
                '.SAMPLE_SIGNATURE_DO_NOT_USE_IN_PRODUCTION';
            
            document.getElementById('jwt-input').value = token;
            decodeJWT();
        }

        function clearAll() {
            document.getElementById('jwt-input').value = '';
            decodeJWT();
        }

        // Auto-decode on page load if there's content (e.g., from URL hash)
        window.addEventListener('load', () => {
            const hash = window.location.hash.slice(1);
            if (hash) {
                try {
                    document.getElementById('jwt-input').value = decodeURIComponent(hash);
                    decodeJWT();
                } catch (e) {}
            }
        });

        // Update URL hash when token changes
        document.getElementById('jwt-input').addEventListener('input', () => {
            const value = document.getElementById('jwt-input').value.trim();
            if (value) {
                history.replaceState(null, '', '#' + encodeURIComponent(value));
            } else {
                history.replaceState(null, '', window.location.pathname);
            }
        });

        // Theme management
        (function() {
            const themeButtons = document.querySelectorAll('.theme-toggle button');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            
            function getSystemTheme() {
                return prefersDark.matches ? 'dark' : 'light';
            }
            
            function applyTheme(theme) {
                const effectiveTheme = theme === 'system' ? getSystemTheme() : theme;
                document.documentElement.setAttribute('data-theme', effectiveTheme);
            }
            
            function setTheme(theme) {
                localStorage.setItem('theme', theme);
                applyTheme(theme);
                themeButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
            }
            
            const savedTheme = localStorage.getItem('theme') || 'system';
            setTheme(savedTheme);
            
            themeButtons.forEach(btn => {
                btn.addEventListener('click', () => setTheme(btn.dataset.theme));
            });
            
            prefersDark.addEventListener('change', () => {
                if (localStorage.getItem('theme') === 'system') {
                    applyTheme('system');
                }
            });
        })();
    </script>
</body>
</html>
